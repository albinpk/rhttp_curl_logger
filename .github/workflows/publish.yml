name: Publish

on:
  push:
    tags:
      - "rhttp_curl_logger-v[0-9]+.[0-9]+.[0-9]+*"

jobs:
  publish:
    permissions:
      id-token: write # Required for authentication using OIDC
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
    with:
      environment: "pub.dev"
      working-directory: packages/rhttp_curl_logger
